# Conda environment for the Street Light Detection project (Windows, CUDA 13)
# Notes:
# - This file installs PyTorch (CPU+CUDA) via conda channels (pytorch + nvidia).
# - We install heavy GPU/CUDA libs with conda (`pytorch-cuda=13.0`) to avoid driver
#   mismatches. Do NOT pip-install low-level NVIDIA/cu* runtime packages on Windows
#   — install the NVIDIA driver from the vendor site instead.
# - After creating the environment, verify `nvidia-smi` and `python -c "import torch; ..."`.

name: streetlight-cuda13
channels:
  - pytorch
  - nvidia
  - conda-forge
  - defaults
dependencies:
  - python=3.12
  - pip
  # Core numeric & plotting libs via conda for reliable binary wheels
  - numpy=2.4.5
  - pandas=3.0.3
  - scipy=1.17.1
  - matplotlib=3.10.9

  # PyTorch + CUDA (13.0) via conda (pytorch + nvidia channels)
  - pytorch=2.12.0
  - torchvision=0.27.0
  - pytorch-cuda=13.0

  # The remaining packages are installed via pip (pinned to versions from requirements.txt)
  - pip:
    - annotated-types==0.7.0
    - certifi==2026.4.22
    - charset-normalizer==3.4.7
    - click==8.4.0
    - contourpy==1.3.3
